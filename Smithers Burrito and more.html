<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smithers Burrito’s & More</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Poppins', sans-serif;
}

body {
height: 100vh;
display: flex;
align-items: center;
justify-content: center;
background: linear-gradient(135deg, #1f1f1f, #3a0ca3);
color: white;
text-align: center;
padding: 20px;
}

.container {
max-width: 600px;
}

h1 {
font-size: 2.8rem;
margin-bottom: 10px;
}

h1 span {
color: #ffbe0b;
}

p {
font-size: 1.2rem;
margin-bottom: 25px;
opacity: 0.85;
}

.countdown {
display: flex;
justify-content: center;
gap: 20px;
margin-bottom: 30px;
}

.time-box {
background: rgba(255,255,255,0.1);
padding: 15px 20px;
border-radius: 12px;
}

.time-box h2 {
font-size: 2rem;
}

.time-box span {
font-size: 0.8rem;
opacity: 0.7;
}

.email-box {
display: flex;
gap: 10px;
justify-content: center;
flex-wrap: wrap;
}

input {
padding: 10px;
border: none;
border-radius: 8px;
width: 220px;
}

button {
padding: 10px 18px;
border: none;
border-radius: 8px;
background: #ffbe0b;
color: black;
font-weight: 600;
cursor: pointer;
transition: 0.2s;
}

button:hover {
background: #ffaa00;
}

footer {
margin-top: 25px;
font-size: 0.8rem;
opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
<h1>🌯 <span>Smithers Burrito’s</span> & More</h1>
<p>We’re cooking something amazing. Opening soon!</p>

<div class="countdown">
<div class="time-box">
<h2 id="days">00</h2>
<span>DAYS</span>
</div>
<div class="time-box">
<h2 id="hours">00</h2>
<span>HOURS</span>
</div>
<div class="time-box">
<h2 id="minutes">00</h2>
<span>MINUTES</span>
</div>
<div class="time-box">
<h2 id="seconds">00</h2>
<span>SECONDS</span>
</div>
</div>

<div class="email-box">
<input type="email" placeholder="Enter your email">
<button onclick="alert('Thanks! We will notify you.')">Notify Me</button>
</div>

<footer>© 2026 Smithers Burrito’s & More</footer>
</div>

<script>
// Set your launch date here
const launchDate = new Date("June 30, 2026 00:00:00").getTime();

const timer = setInterval(() => {
const now = new Date().getTime();
const distance = launchDate - now;

const days = Math.floor(distance / (1000 * 60 * 60 * 24));
const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
const seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("days").innerText = days;
document.getElementById("hours").innerText = hours;
document.getElementById("minutes").innerText = minutes;
document.getElementById("seconds").innerText = seconds;

if (distance < 0) {
clearInterval(timer);
document.querySelector(".countdown").innerHTML = "We're Open!";
}
}, 1000);
</script>

</body>
</html>
